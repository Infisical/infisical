name: Release standalone docker image
on:
    push:
        tags:
            - "v0.*.*"
            - "v0.*.*-nightly-*"
            - "v0.*.*-nightly-*.*"

jobs:
    infisical-tests:
        name: Run tests before deployment
        # https://docs.github.com/en/actions/using-workflows/reusing-workflows#overview
        uses: ./.github/workflows/run-backend-tests.yml

    infisical-standalone:
        name: Build infisical standalone image postgres
        runs-on: ubuntu-latest
        needs: [infisical-tests]
        permissions:
            id-token: write # OIDC, to assume the ECR Public publish role
            contents: read
        env:
            # Surfaced so the ECR mirror steps can be skipped when the role is
            # not configured, decoupling them from the Docker Hub release.
            ECR_PUBLIC_PUBLISH_ROLE_ARN: ${{ secrets.ECR_PUBLIC_PUBLISH_ROLE_ARN }}
        steps:
            - name: Extract version from tag
              id: extract_version
              run: echo "::set-output name=version::${GITHUB_REF_NAME}"
            - name: ☁️ Checkout source
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 Nov 14, 2025
              with:
                  fetch-depth: 0
            - name: 📦 Install dependencies to test all dependencies
              run: npm ci --only-production
              working-directory: backend
            - name: version output
              run: |
                  echo "Output Value: ${{ steps.version.outputs.major }}"
                  echo "Output Value: ${{ steps.version.outputs.minor }}"
                  echo "Output Value: ${{ steps.version.outputs.patch }}"
                  echo "Output Value: ${{ steps.version.outputs.version }}"
                  echo "Output Value: ${{ steps.version.outputs.version_type }}"
                  echo "Output Value: ${{ steps.version.outputs.increment }}"
            - name: Save commit hashes for tag
              id: commit
              run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            - name: 🔧 Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
            - name: 🐋 Login to Docker Hub
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Set up Depot CLI
              uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1.7.1
            - name: 📦 Build backend and push to Docker Hub
              uses: depot/build-push-action@5f3b3c2e5a00f0093de47f657aeaefcedff27d18 # Main / v1, Mar 10, 2026
              with:
                  project: 64mmf0n610
                  token: ${{ secrets.DEPOT_PROJECT_TOKEN }}
                  push: true
                  context: .
                  tags: |
                      infisical/infisical:latest
                      infisical/infisical:${{ steps.commit.outputs.short }}
                      infisical/infisical:${{ steps.extract_version.outputs.version }}
                  platforms: linux/amd64,linux/arm64
                  file: Dockerfile.standalone-infisical
                  build-args: |
                      POSTHOG_API_KEY=${{ secrets.PUBLIC_POSTHOG_API_KEY }}
                      INFISICAL_PLATFORM_VERSION=${{ steps.extract_version.outputs.version }}
                      DD_GIT_REPOSITORY_URL=${{ github.server_url }}/${{ github.repository }}
                      DD_GIT_COMMIT_SHA=${{ github.sha }}
                  secrets: |
                      contentful_space_id=${{ secrets.CONTENTFUL_SPACE_ID }}
                      contentful_delivery_token=${{ secrets.CONTENTFUL_DELIVERY_TOKEN }}
                      contentful_environment=${{ vars.CONTENTFUL_ENVIRONMENT }}
            # Mirror the pushed image to Amazon ECR Public. Best-effort: guarded on
            # ECR_PUBLIC_PUBLISH_ROLE_ARN and marked continue-on-error so a missing
            # credential or a mirror failure can never block the Docker Hub release above
            # (already completed) or the downstream jobs. imagetools copies the existing
            # manifest (no rebuild), preserving the multi-arch digests pushed to Docker Hub.
            - name: Configure AWS credentials for ECR Public
              if: env.ECR_PUBLIC_PUBLISH_ROLE_ARN != ''
              continue-on-error: true
              uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
              with:
                  audience: sts.amazonaws.com
                  aws-region: us-east-1 # ECR Public auth is only available in us-east-1
                  role-to-assume: ${{ env.ECR_PUBLIC_PUBLISH_ROLE_ARN }}
            - name: 🐋 Login to Amazon ECR Public
              if: env.ECR_PUBLIC_PUBLISH_ROLE_ARN != ''
              continue-on-error: true
              run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws
            - name: 🪞 Mirror image to Amazon ECR Public
              if: env.ECR_PUBLIC_PUBLISH_ROLE_ARN != ''
              continue-on-error: true
              env:
                  # Passed via env (not interpolated into the script) so a crafted
                  # tag name can't inject shell commands.
                  IMAGE_VERSION: ${{ steps.extract_version.outputs.version }}
                  IMAGE_SHORT_SHA: ${{ steps.commit.outputs.short }}
              run: |
                  docker buildx imagetools create \
                    --tag "public.ecr.aws/p5f0g7h8/infisical:latest" \
                    --tag "public.ecr.aws/p5f0g7h8/infisical:${IMAGE_SHORT_SHA}" \
                    --tag "public.ecr.aws/p5f0g7h8/infisical:${IMAGE_VERSION}" \
                    "docker.io/infisical/infisical:${IMAGE_VERSION}"
            - name: Snyk to check Docker image for vulnerabilities
              continue-on-error: true 
              uses: snyk/actions/docker@9cf6ca713d71123d2d229cc3d7f145b96ea3c518 # master @ 2026-05-05
              env:
                SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                image: infisical/infisical:${{ steps.extract_version.outputs.version }}
                command: monitor
                args: --file=Dockerfile.standalone-infisical --project-name="infisical-core-docker-image"

    infisical-fips-standalone:
        name: Build infisical standalone image postgres
        runs-on: ubuntu-latest
        needs: [infisical-tests]
        steps:
            - name: Extract version from tag
              id: extract_version
              run: echo "::set-output name=version::${GITHUB_REF_NAME}"
            - name: ☁️ Checkout source
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 Nov 14, 2025
              with:
                  fetch-depth: 0
            - name: 📦 Install dependencies to test all dependencies
              run: npm ci --only-production
              working-directory: backend
            - name: version output
              run: |
                  echo "Output Value: ${{ steps.version.outputs.major }}"
                  echo "Output Value: ${{ steps.version.outputs.minor }}"
                  echo "Output Value: ${{ steps.version.outputs.patch }}"
                  echo "Output Value: ${{ steps.version.outputs.version }}"
                  echo "Output Value: ${{ steps.version.outputs.version_type }}"
                  echo "Output Value: ${{ steps.version.outputs.increment }}"
            - name: Save commit hashes for tag
              id: commit
              run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            - name: 🔧 Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
            - name: 🐋 Login to Docker Hub
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Set up Depot CLI
              uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1.7.1
            - name: 📦 Build backend and export to Docker
              uses: depot/build-push-action@5f3b3c2e5a00f0093de47f657aeaefcedff27d18 # Main / v1, Mar 10, 2026
              with:
                  project: 64mmf0n610
                  token: ${{ secrets.DEPOT_PROJECT_TOKEN }}
                  push: true
                  context: .
                  tags: |
                      infisical/infisical-fips:latest
                      infisical/infisical-fips:${{ steps.commit.outputs.short }}
                      infisical/infisical-fips:${{ steps.extract_version.outputs.version }}
                  platforms: linux/amd64,linux/arm64
                  file: Dockerfile.fips.standalone-infisical
                  build-args: |
                      POSTHOG_API_KEY=${{ secrets.PUBLIC_POSTHOG_API_KEY }}
                      INFISICAL_PLATFORM_VERSION=${{ steps.extract_version.outputs.version }}
                  secrets: |
                      contentful_space_id=${{ secrets.CONTENTFUL_SPACE_ID }}
                      contentful_delivery_token=${{ secrets.CONTENTFUL_DELIVERY_TOKEN }}
                      contentful_environment=${{ vars.CONTENTFUL_ENVIRONMENT }}
    trigger-binary-release:
      runs-on: ubuntu-latest
      needs: [infisical-tests]
      steps:
        - name: Create tag if it doesn't exist
          run: |
            TAG_NAME="${{ github.ref_name }}"
            echo "Checking for tag: $TAG_NAME"

            EXACT_MATCH=$(gh api repos/Infisical/infisical-omnibus/git/refs/tags/$TAG_NAME 2>/dev/null | jq -r 'if type == "array" then .[].ref else .ref end' | grep -x "refs/tags/$TAG_NAME" || true)

            if [ "$EXACT_MATCH" == "refs/tags/$TAG_NAME" ]; then
              echo "Tag $TAG_NAME already exists, skipping..."
            else
              echo "Creating tag in Infisical/infisical-omnibus: $TAG_NAME"
              LATEST_SHA=$(gh api repos/Infisical/infisical-omnibus/git/refs/heads/main --jq '.object.sha')
              echo "Latest SHA: $LATEST_SHA"

              gh api repos/Infisical/infisical-omnibus/git/refs \
                --method POST \
                --field ref="refs/tags/$TAG_NAME" \
                --field sha="$LATEST_SHA"

              echo "Successfully created tag $TAG_NAME"
            fi
          env:
            GH_TOKEN: ${{ secrets.OMNIBUS_RELEASE_TOKEN }}

    generate-upgrade-impact:
        name: Generate upgrade impact PR
        needs: [infisical-standalone, infisical-fips-standalone, trigger-binary-release]
        permissions:
            contents: write
            pull-requests: write
        uses: ./.github/workflows/generate-upgrade-impact.yml
        with:
            tag: ${{ github.ref_name }}
        secrets: inherit
