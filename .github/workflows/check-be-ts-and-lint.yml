name: "Check Backend PR types and lint"

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "backend/**"
      - "!backend/README.md"
      - "!backend/.*"
      - "backend/.eslintrc.js"

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ☁️ Checkout source
        uses: actions/checkout@v4
      - name: 🔧 Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 📦 Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-node-modules-${{ hashFiles('backend/package-lock.json') }}
      - name: 📦 Cache tsbuildinfo
        uses: actions/cache@v4
        with:
          path: backend/node_modules/.tmp/tsconfig.tsbuildinfo
          key: backend-tsbuildinfo-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            backend-tsbuildinfo-${{ github.ref }}-
            backend-tsbuildinfo-
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: backend
      - name: Run type check
        run: npm run type:check
        working-directory: backend

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ☁️ Checkout source
        uses: actions/checkout@v4
      - name: 🔧 Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 📦 Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-node-modules-${{ hashFiles('backend/package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: backend
      - name: Run lint check
        run: npm run lint
        working-directory: backend
