name: Generate Changelog

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to generate changelog for (e.g. v0.159.25). Defaults to latest tag if omitted."
        required: false
  push:
    tags:
      - "v*.*.*"

jobs:
  generate_changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.0"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Generate Changelog and Post to Slack
        id: gen-changelog
        run: python .github/resources/changelog-generator.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_2 }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
