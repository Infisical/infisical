upstream api {
    server backend:4000;
}

server {
    listen 80;

    large_client_header_buffers 8 128k;
    client_header_buffer_size 128k;

    # WebSocket endpoint for PAM web access
    location ~ ^/api/v1/pam/accounts/[^/]+/web-access$ {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Disable buffering for real-time communication
        proxy_buffering off;
        proxy_cache off;

        # Increase timeouts for long-lived connections
        proxy_read_timeout 4200s;
        proxy_send_timeout 4200s;

        proxy_pass http://api;
        proxy_redirect off;

        proxy_cookie_path / "/; SameSite=strict";
    }

    # KMS encrypt/decrypt/sign/verify accept payloads up to 1MB (~1.37MB base64 + JSON on the wire).
    # Scoped here so the larger body limit applies only to these endpoints, not all of /api.
    location ~ ^/api/v1/kms/keys/[^/]+/(encrypt|decrypt|sign|verify)$ {
        client_max_body_size 2M;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;

        proxy_pass http://api;
        proxy_redirect off;

        proxy_cookie_path / "/; SameSite=strict";
    }

    # Identity TLS-cert auth: the client certificate is provided by the TLS-terminating proxy.
    # Regex (matched before the /api block below) covers the optional trailing slash, since the
    # backend treats /login and /login/ as the same route.
    location ~ ^/api/v1/auth/tls-cert-auth/login/?$ {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;

        proxy_set_header X-Identity-Tls-Cert-Auth-Client-Cert $ssl_client_escaped_cert;

        proxy_pass http://api;
        proxy_redirect off;

        proxy_cookie_path / "/; SameSite=strict";
    }

    location ~ ^/(api|secret-scanning/webhooks) {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;

        # This header is populated only by the dedicated TLS-cert-auth location above.
        proxy_set_header X-Identity-Tls-Cert-Auth-Client-Cert "";

        proxy_pass http://api;
        proxy_redirect off;

        proxy_cookie_path / "/; SameSite=strict";
    }

		location /runtime-ui-env.js {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;

        proxy_pass http://api;
        proxy_redirect off;

        proxy_cookie_path / "/; HttpOnly; SameSite=strict";
    }

    location /api/v3/migrate {
        client_max_body_size 25M;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;

        proxy_pass http://api;
        proxy_redirect off;

        proxy_cookie_path / "/; HttpOnly; SameSite=strict";
    }

    location /scep {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;

        proxy_pass http://api;
        proxy_redirect off;

        proxy_cookie_path / "/; HttpOnly; SameSite=strict";
    }

    location ~ /\.well-known {

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;

        proxy_set_header X-SSL-Client-Cert $ssl_client_escaped_cert;
        # proxy_set_header X-SSL-Client-Cert $http_x_ssl_client_cert;
        # proxy_pass_request_headers on;

        proxy_pass http://api;
        proxy_redirect off;

        # proxy_cookie_path / "/; secure; HttpOnly; SameSite=strict";
        proxy_cookie_path / "/; HttpOnly; SameSite=strict";
    }

    location / {
        include /etc/nginx/mime.types;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_pass http://frontend:3000;
        proxy_redirect off;
    }
}
