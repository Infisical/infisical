breakingChanges:
  - title: Identity auth TLS verification
    description: TLS certificate verification is now enforced for OIDC, JWT JWKS, and Kubernetes auth endpoints. Previously, these authentication flows accepted untrusted certificates. If your endpoints use publicly signed certificates, they will continue to work using the system's default CA trust store.
    action: If you use self-signed or internal CA certificates for any identity auth endpoint (OIDC issuer, JWT JWKS URL, or Kubernetes API), add the issuing CA certificate to the corresponding auth method configuration. Also verify that all configured hostnames match the certificate's Subject Alternative Name (SAN) or Common Name (CN).
