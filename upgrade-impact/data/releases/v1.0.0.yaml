breakingChanges:
  - title: GitHub App host setting
    description: Shared GitHub App flows now use only the server-side host setting.
      GHES deployments without INF_APP_CONNECTION_GITHUB_APP_HOST will resolve
      to github.com and GitHub App connection flows will fail.
    action: Set INF_APP_CONNECTION_GITHUB_APP_HOST to your GHES hostname before
      upgrading. Leave it unset for github.com deployments.
