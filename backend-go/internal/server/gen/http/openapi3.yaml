openapi: 3.0.3
info:
    title: Infisical API
    description: Infisical secret management platform API
    version: 0.0.1
servers:
    - url: http://localhost:8080
paths:
    /api/v1/platform/projects:
        post:
            tags:
                - projects
            summary: createProject projects
            description: Create a new project.
            operationId: projects#createProject
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateProjectRequestBody'
            responses:
                "201":
                    description: Created response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Project'
                "400":
                    description: 'bad_request: Invalid request'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "401":
                    description: 'unauthorized: Authentication required'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "403":
                    description: 'forbidden: Permission denied'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "404":
                    description: 'not_found: Resource not found'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "500":
                    description: 'internal_error: Internal server error'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
            security:
                - jwt_header_Authorization: []
                - identity_access_token_header_Authorization: []
                - service_token_header_Authorization: []
    /api/v1/platform/projects/health:
        get:
            tags:
                - projects
            summary: getHealth projects
            description: Health check for the projects service.
            operationId: projects#getHealth
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                type: string
                "400":
                    description: 'bad_request: Invalid request'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "401":
                    description: 'unauthorized: Authentication required'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "403":
                    description: 'forbidden: Permission denied'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "404":
                    description: 'not_found: Resource not found'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "500":
                    description: 'internal_error: Internal server error'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
    /api/v3/secrets/raw:
        get:
            tags:
                - secrets
            summary: listSecretsRawV3 secrets
            description: List raw secrets for a project environment (V3, deprecated).
            operationId: secrets#listSecretsRawV3
            parameters:
                - name: workspaceId
                  in: query
                  description: Workspace/project ID
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Workspace/project ID
                - name: workspaceSlug
                  in: query
                  description: Workspace/project slug
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Workspace/project slug
                - name: environment
                  in: query
                  description: Environment slug
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Environment slug
                - name: secretPath
                  in: query
                  description: Secret path
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Secret path
                    default: /
                - name: viewSecretValue
                  in: query
                  description: Whether to include the secret value
                  allowEmptyValue: true
                  schema:
                    type: boolean
                    description: Whether to include the secret value
                    default: true
                - name: expandSecretReferences
                  in: query
                  description: Whether to expand secret references
                  allowEmptyValue: true
                  schema:
                    type: boolean
                    description: Whether to expand secret references
                    default: false
                - name: recursive
                  in: query
                  description: Whether to list secrets recursively
                  allowEmptyValue: true
                  schema:
                    type: boolean
                    description: Whether to list secrets recursively
                    default: false
                - name: include_imports
                  in: query
                  description: Whether to include imported secrets
                  allowEmptyValue: true
                  schema:
                    type: boolean
                    description: Whether to include imported secrets
                    default: false
                - name: tagSlugs
                  in: query
                  description: Comma-separated tag slugs to filter by
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Comma-separated tag slugs to filter by
                - name: metadataFilter
                  in: query
                  description: Pipe-delimited metadata filter (key=k,value=v|...)
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Pipe-delimited metadata filter (key=k,value=v|...)
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListSecretsResult'
                "400":
                    description: 'bad_request: Invalid request'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "401":
                    description: 'unauthorized: Authentication required'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "403":
                    description: 'forbidden: Permission denied'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "404":
                    description: 'not_found: Resource not found'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "500":
                    description: 'internal_error: Internal server error'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
            security:
                - jwt_header_Authorization: []
                - identity_access_token_header_Authorization: []
                - service_token_header_Authorization: []
    /api/v3/secrets/raw/{secretName}:
        get:
            tags:
                - secrets
            summary: getSecretByNameRawV3 secrets
            description: Get a raw secret by name (V3, deprecated).
            operationId: secrets#getSecretByNameRawV3
            parameters:
                - name: workspaceId
                  in: query
                  description: Workspace/project ID
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Workspace/project ID
                - name: workspaceSlug
                  in: query
                  description: Workspace/project slug
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Workspace/project slug
                - name: environment
                  in: query
                  description: Environment slug
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Environment slug
                - name: secretPath
                  in: query
                  description: Secret path
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Secret path
                    default: /
                - name: version
                  in: query
                  description: Secret version
                  allowEmptyValue: true
                  schema:
                    type: integer
                    description: Secret version
                    format: int64
                - name: type
                  in: query
                  description: Secret type (shared or personal)
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Secret type (shared or personal)
                    default: shared
                    enum:
                        - shared
                        - personal
                - name: viewSecretValue
                  in: query
                  description: Whether to include the secret value
                  allowEmptyValue: true
                  schema:
                    type: boolean
                    description: Whether to include the secret value
                    default: true
                - name: expandSecretReferences
                  in: query
                  description: Whether to expand secret references
                  allowEmptyValue: true
                  schema:
                    type: boolean
                    description: Whether to expand secret references
                    default: false
                - name: include_imports
                  in: query
                  description: Whether to include imported secrets
                  allowEmptyValue: true
                  schema:
                    type: boolean
                    description: Whether to include imported secrets
                    default: false
                - name: secretName
                  in: path
                  description: Secret name
                  required: true
                  schema:
                    type: string
                    description: Secret name
                    minLength: 1
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GetSecretResult'
                "400":
                    description: 'bad_request: Invalid request'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "401":
                    description: 'unauthorized: Authentication required'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "403":
                    description: 'forbidden: Permission denied'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "404":
                    description: 'not_found: Resource not found'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "500":
                    description: 'internal_error: Internal server error'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
            security:
                - jwt_header_Authorization: []
                - identity_access_token_header_Authorization: []
                - service_token_header_Authorization: []
    /api/v4/secrets:
        get:
            tags:
                - secrets
            summary: listSecretsV4 secrets
            description: List secrets for a project environment (V4).
            operationId: secrets#listSecretsV4
            parameters:
                - name: projectId
                  in: query
                  description: Project ID
                  allowEmptyValue: true
                  required: true
                  schema:
                    type: string
                    description: Project ID
                - name: environment
                  in: query
                  description: Environment slug
                  allowEmptyValue: true
                  required: true
                  schema:
                    type: string
                    description: Environment slug
                - name: secretPath
                  in: query
                  description: Secret path
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Secret path
                    default: /
                - name: viewSecretValue
                  in: query
                  description: Whether to include the secret value
                  allowEmptyValue: true
                  schema:
                    type: boolean
                    description: Whether to include the secret value
                    default: true
                - name: expandSecretReferences
                  in: query
                  description: Whether to expand secret references
                  allowEmptyValue: true
                  schema:
                    type: boolean
                    description: Whether to expand secret references
                    default: true
                - name: recursive
                  in: query
                  description: Whether to list secrets recursively
                  allowEmptyValue: true
                  schema:
                    type: boolean
                    description: Whether to list secrets recursively
                    default: false
                - name: includePersonalOverrides
                  in: query
                  description: Whether to include personal overrides
                  allowEmptyValue: true
                  schema:
                    type: boolean
                    description: Whether to include personal overrides
                    default: false
                - name: includeImports
                  in: query
                  description: Whether to include imported secrets
                  allowEmptyValue: true
                  schema:
                    type: boolean
                    description: Whether to include imported secrets
                    default: true
                - name: tagSlugs
                  in: query
                  description: Comma-separated tag slugs to filter by
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Comma-separated tag slugs to filter by
                - name: metadataFilter
                  in: query
                  description: Pipe-delimited metadata filter (key=k,value=v|...)
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Pipe-delimited metadata filter (key=k,value=v|...)
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListSecretsResult'
                "400":
                    description: 'bad_request: Invalid request'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "401":
                    description: 'unauthorized: Authentication required'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "403":
                    description: 'forbidden: Permission denied'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "404":
                    description: 'not_found: Resource not found'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "500":
                    description: 'internal_error: Internal server error'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
            security:
                - jwt_header_Authorization: []
                - identity_access_token_header_Authorization: []
                - service_token_header_Authorization: []
    /api/v4/secrets/{secretName}:
        get:
            tags:
                - secrets
            summary: getSecretByNameV4 secrets
            description: Get a secret by name (V4).
            operationId: secrets#getSecretByNameV4
            parameters:
                - name: projectId
                  in: query
                  description: Project ID
                  allowEmptyValue: true
                  required: true
                  schema:
                    type: string
                    description: Project ID
                - name: environment
                  in: query
                  description: Environment slug
                  allowEmptyValue: true
                  required: true
                  schema:
                    type: string
                    description: Environment slug
                - name: secretPath
                  in: query
                  description: Secret path
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Secret path
                    default: /
                - name: version
                  in: query
                  description: Secret version
                  allowEmptyValue: true
                  schema:
                    type: integer
                    description: Secret version
                    format: int64
                - name: type
                  in: query
                  description: Secret type (shared or personal)
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Secret type (shared or personal)
                    default: shared
                    enum:
                        - shared
                        - personal
                - name: viewSecretValue
                  in: query
                  description: Whether to include the secret value
                  allowEmptyValue: true
                  schema:
                    type: boolean
                    description: Whether to include the secret value
                    default: true
                - name: expandSecretReferences
                  in: query
                  description: Whether to expand secret references
                  allowEmptyValue: true
                  schema:
                    type: boolean
                    description: Whether to expand secret references
                    default: true
                - name: includeImports
                  in: query
                  description: Whether to include imported secrets
                  allowEmptyValue: true
                  schema:
                    type: boolean
                    description: Whether to include imported secrets
                    default: true
                - name: secretName
                  in: path
                  description: Secret name
                  required: true
                  schema:
                    type: string
                    description: Secret name
                    minLength: 1
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GetSecretResult'
                "400":
                    description: 'bad_request: Invalid request'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "401":
                    description: 'unauthorized: Authentication required'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "403":
                    description: 'forbidden: Permission denied'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "404":
                    description: 'not_found: Resource not found'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "500":
                    description: 'internal_error: Internal server error'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
            security:
                - jwt_header_Authorization: []
                - identity_access_token_header_Authorization: []
                - service_token_header_Authorization: []
components:
    schemas:
        APIErrorResult:
            type: object
            properties:
                details:
                    description: Optional structured details
                error:
                    type: string
                    description: Error class name
                message:
                    type: string
                    description: Human-readable error message
                statusCode:
                    type: integer
                    description: HTTP status code
                    format: int64
            required:
                - statusCode
                - message
                - error
        CreateProjectRequestBody:
            type: object
            properties:
                name:
                    type: string
                    description: Project name
                    minLength: 1
                orgId:
                    type: string
                    description: Organization ID
            required:
                - name
                - orgId
        GetSecretResult:
            type: object
            properties:
                secret:
                    $ref: '#/components/schemas/SecretRaw'
            required:
                - secret
        ImportSecretRaw:
            type: object
            properties:
                actor:
                    $ref: '#/components/schemas/SecretActor'
                environment:
                    type: string
                    description: Environment slug
                id:
                    type: string
                    description: Secret ID
                isRotatedSecret:
                    type: boolean
                    description: Whether this is a rotated secret
                legacyId:
                    type: string
                    description: Legacy secret ID
                rotationId:
                    type: string
                    description: Rotation ID (UUID)
                secretComment:
                    type: string
                    description: Secret comment
                secretKey:
                    type: string
                    description: Secret key
                secretMetadata:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResourceMetadata'
                    description: Secret metadata entries
                secretReminderNote:
                    type: string
                    description: Reminder note
                secretReminderRepeatDays:
                    type: integer
                    description: Reminder repeat days
                    format: int64
                secretValue:
                    type: string
                    description: Secret value
                secretValueHidden:
                    type: boolean
                    description: Whether the secret value is hidden
                skipMultilineEncoding:
                    type: boolean
                    description: Skip multiline encoding
                type:
                    type: string
                    description: Secret type (shared or personal)
                version:
                    type: integer
                    description: Secret version
                    format: int64
                workspace:
                    type: string
                    description: Workspace/project ID
            required:
                - id
                - legacyId
                - workspace
                - environment
                - version
                - type
                - secretKey
                - secretValue
                - secretComment
                - secretValueHidden
        ListSecretsResult:
            type: object
            properties:
                imports:
                    type: array
                    items:
                        $ref: '#/components/schemas/SecretImport'
                    description: Imported secret blocks
                secrets:
                    type: array
                    items:
                        $ref: '#/components/schemas/SecretRaw'
                    description: List of secrets
            required:
                - secrets
        Project:
            type: object
            properties:
                id:
                    type: string
                    description: Project ID
                name:
                    type: string
                    description: Project name
                orgId:
                    type: string
                    description: Organization ID
            required:
                - id
                - name
                - orgId
        ResourceMetadata:
            type: object
            properties:
                isEncrypted:
                    type: boolean
                    description: Whether the value is encrypted
                    default: false
                key:
                    type: string
                    description: Metadata key
                value:
                    type: string
                    description: Metadata value
                    default: ""
            required:
                - key
        SecretActor:
            type: object
            properties:
                actorId:
                    type: string
                    description: Actor ID
                actorType:
                    type: string
                    description: Actor type
                groupId:
                    type: string
                    description: Group ID
                membershipId:
                    type: string
                    description: Membership ID
                name:
                    type: string
                    description: Actor name
        SecretImport:
            type: object
            properties:
                environment:
                    type: string
                    description: Import source environment
                folderId:
                    type: string
                    description: Import source folder ID
                secretPath:
                    type: string
                    description: Import source path
                secrets:
                    type: array
                    items:
                        $ref: '#/components/schemas/ImportSecretRaw'
                    description: Imported secrets
            required:
                - secretPath
                - environment
                - secrets
        SecretRaw:
            type: object
            properties:
                actor:
                    $ref: '#/components/schemas/SecretActor'
                createdAt:
                    type: string
                    description: Creation timestamp
                environment:
                    type: string
                    description: Environment slug
                id:
                    type: string
                    description: Secret ID
                isRotatedSecret:
                    type: boolean
                    description: Whether this is a rotated secret
                legacyId:
                    type: string
                    description: Legacy secret ID
                rotationId:
                    type: string
                    description: Rotation ID (UUID)
                secretComment:
                    type: string
                    description: Secret comment
                secretKey:
                    type: string
                    description: Secret key
                secretMetadata:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResourceMetadata'
                    description: Secret metadata entries
                secretPath:
                    type: string
                    description: Path of the secret
                secretReminderNote:
                    type: string
                    description: Reminder note
                secretReminderRepeatDays:
                    type: integer
                    description: Reminder repeat days
                    format: int64
                secretValue:
                    type: string
                    description: Secret value
                secretValueHidden:
                    type: boolean
                    description: Whether the secret value is hidden
                skipMultilineEncoding:
                    type: boolean
                    description: Skip multiline encoding
                tags:
                    type: array
                    items:
                        $ref: '#/components/schemas/SecretTag'
                    description: Tags attached to the secret
                type:
                    type: string
                    description: Secret type (shared or personal)
                updatedAt:
                    type: string
                    description: Last update timestamp
                version:
                    type: integer
                    description: Secret version
                    format: int64
                workspace:
                    type: string
                    description: Workspace/project ID
            required:
                - id
                - legacyId
                - workspace
                - environment
                - version
                - type
                - secretKey
                - secretValue
                - secretComment
                - createdAt
                - updatedAt
                - secretValueHidden
        SecretTag:
            type: object
            properties:
                color:
                    type: string
                    description: Tag color
                id:
                    type: string
                    description: Tag ID (UUID)
                name:
                    type: string
                    description: Tag name
                slug:
                    type: string
                    description: Tag slug
            required:
                - id
                - slug
                - name
    securitySchemes:
        identity_access_token_header_Authorization:
            type: http
            description: 'Machine identity access token via Authorization: Bearer header'
            scheme: bearer
        jwt_header_Authorization:
            type: http
            description: 'User session JWT token via Authorization: Bearer header'
            scheme: bearer
        service_token_header_Authorization:
            type: http
            description: 'Service token via Authorization: Bearer header'
            scheme: bearer
tags:
    - name: projects
      description: Service for managing projects.
    - name: secrets
      description: Service for managing secrets.
