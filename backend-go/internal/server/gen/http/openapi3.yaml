openapi: 3.0.3
info:
    title: Infisical API
    description: Infisical secret management platform API
    version: 0.0.1
servers:
    - url: http://localhost:8080
paths:
    /api/v1/platform/projects:
        post:
            tags:
                - projects
            summary: createProject projects
            description: Create a new project.
            operationId: projects#createProject
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateProjectPayload'
            responses:
                "201":
                    description: Created response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Project'
                "400":
                    description: 'bad_request: Invalid request'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "401":
                    description: 'unauthorized: Authentication required'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "403":
                    description: 'forbidden: Permission denied'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "404":
                    description: 'not_found: Resource not found'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "500":
                    description: 'internal_error: Internal server error'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
    /api/v1/platform/projects/health:
        get:
            tags:
                - projects
            summary: getHealth projects
            description: Health check for the projects service.
            operationId: projects#getHealth
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                type: string
                "400":
                    description: 'bad_request: Invalid request'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "401":
                    description: 'unauthorized: Authentication required'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "403":
                    description: 'forbidden: Permission denied'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "404":
                    description: 'not_found: Resource not found'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "500":
                    description: 'internal_error: Internal server error'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
    /api/v1/secret-manager/secrets:
        get:
            tags:
                - secrets
            summary: listSecrets secrets
            description: List secrets for an environment.
            operationId: secrets#listSecrets
            parameters:
                - name: projectId
                  in: query
                  description: Project ID
                  allowEmptyValue: true
                  required: true
                  schema:
                    type: string
                    description: Project ID
                - name: environment
                  in: query
                  description: Environment slug
                  allowEmptyValue: true
                  required: true
                  schema:
                    type: string
                    description: Environment slug
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SecretResultCollection'
                "400":
                    description: 'bad_request: Invalid request'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "401":
                    description: 'unauthorized: Authentication required'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "403":
                    description: 'forbidden: Permission denied'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "404":
                    description: 'not_found: Resource not found'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "500":
                    description: 'internal_error: Internal server error'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
        post:
            tags:
                - secrets
            summary: createSecret secrets
            description: Create a new secret.
            operationId: secrets#createSecret
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Secret'
            responses:
                "201":
                    description: Created response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Secret3'
                "400":
                    description: 'bad_request: Invalid request'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "401":
                    description: 'unauthorized: Authentication required'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "403":
                    description: 'forbidden: Permission denied'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "404":
                    description: 'not_found: Resource not found'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "500":
                    description: 'internal_error: Internal server error'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
    /api/v1/secret-manager/secrets/{id}:
        delete:
            tags:
                - secrets
            summary: deleteSecret secrets
            description: Delete a secret by ID.
            operationId: secrets#deleteSecret
            parameters:
                - name: id
                  in: path
                  description: Secret ID
                  required: true
                  schema:
                    type: string
                    description: Secret ID
            responses:
                "204":
                    description: No Content response.
                "400":
                    description: 'bad_request: Invalid request'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "401":
                    description: 'unauthorized: Authentication required'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "403":
                    description: 'forbidden: Permission denied'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "404":
                    description: 'not_found: Resource not found'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "500":
                    description: 'internal_error: Internal server error'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
        get:
            tags:
                - secrets
            summary: getSecret secrets
            description: Get a secret by ID.
            operationId: secrets#getSecret
            parameters:
                - name: id
                  in: path
                  description: Secret ID
                  required: true
                  schema:
                    type: string
                    description: Secret ID
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Secret4'
                "400":
                    description: 'bad_request: Invalid request'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "401":
                    description: 'unauthorized: Authentication required'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "403":
                    description: 'forbidden: Permission denied'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "404":
                    description: 'not_found: Resource not found'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "500":
                    description: 'internal_error: Internal server error'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
        patch:
            tags:
                - secrets
            summary: updateSecret secrets
            description: Update an existing secret.
            operationId: secrets#updateSecret
            parameters:
                - name: id
                  in: path
                  description: Secret ID
                  required: true
                  schema:
                    type: string
                    description: Secret ID
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UpdateSecretRequestBody'
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Secret5'
                "400":
                    description: 'bad_request: Invalid request'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "401":
                    description: 'unauthorized: Authentication required'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "403":
                    description: 'forbidden: Permission denied'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "404":
                    description: 'not_found: Resource not found'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "500":
                    description: 'internal_error: Internal server error'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
    /api/v1/secret-manager/secrets/health:
        get:
            tags:
                - secrets
            summary: getHealth secrets
            description: Health check for the secrets service.
            operationId: secrets#getHealth
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                type: string
                "400":
                    description: 'bad_request: Invalid request'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "401":
                    description: 'unauthorized: Authentication required'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "403":
                    description: 'forbidden: Permission denied'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "404":
                    description: 'not_found: Resource not found'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
                "500":
                    description: 'internal_error: Internal server error'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/APIErrorResult'
components:
    schemas:
        APIErrorResult:
            type: object
            properties:
                details:
                    description: Optional structured details
                error:
                    type: string
                    description: Error class name
                message:
                    type: string
                    description: Human-readable error message
                statusCode:
                    type: integer
                    description: HTTP status code
                    format: int64
            required:
                - statusCode
                - message
                - error
        CreateProjectPayload:
            type: object
            properties:
                name:
                    type: string
                    description: Project name
                    minLength: 1
                orgId:
                    type: string
                    description: Organization ID
            required:
                - name
                - orgId
        Project:
            type: object
            properties:
                id:
                    type: string
                    description: Project ID
                name:
                    type: string
                    description: Project name
                orgId:
                    type: string
                    description: Organization ID
            required:
                - id
                - name
                - orgId
        Secret:
            type: object
            properties:
                environment:
                    type: string
                    description: Environment slug
                key:
                    type: string
                    description: Secret key
                    example: DATABASE_URL
                projectId:
                    type: string
                    description: Project ID
                value:
                    type: string
                    description: Secret value
            required:
                - key
                - value
                - environment
                - projectId
        Secret2:
            type: object
            properties:
                environment:
                    type: string
                    description: Environment slug
                id:
                    type: string
                    description: Secret ID
                key:
                    type: string
                    description: Secret key
                projectId:
                    type: string
                    description: Project ID
                value:
                    type: string
                    description: Secret value
            required:
                - id
                - key
                - value
                - environment
                - projectId
        Secret3:
            type: object
            properties:
                environment:
                    type: string
                    description: Environment slug
                id:
                    type: string
                    description: Secret ID
                key:
                    type: string
                    description: Secret key
                projectId:
                    type: string
                    description: Project ID
                value:
                    type: string
                    description: Secret value
            required:
                - id
                - key
                - value
                - environment
                - projectId
        Secret4:
            type: object
            properties:
                environment:
                    type: string
                    description: Environment slug
                id:
                    type: string
                    description: Secret ID
                key:
                    type: string
                    description: Secret key
                projectId:
                    type: string
                    description: Project ID
                value:
                    type: string
                    description: Secret value
            required:
                - id
                - key
                - value
                - environment
                - projectId
        Secret5:
            type: object
            properties:
                environment:
                    type: string
                    description: Environment slug
                id:
                    type: string
                    description: Secret ID
                key:
                    type: string
                    description: Secret key
                projectId:
                    type: string
                    description: Project ID
                value:
                    type: string
                    description: Secret value
            required:
                - id
                - key
                - value
                - environment
                - projectId
        Secret6:
            type: object
            properties:
                environment:
                    type: string
                    description: Environment slug
                id:
                    type: string
                    description: Secret ID
                key:
                    type: string
                    description: Secret key
                projectId:
                    type: string
                    description: Project ID
                value:
                    type: string
                    description: Secret value
            required:
                - id
                - key
                - value
                - environment
                - projectId
        SecretResultCollection:
            type: array
            items:
                $ref: '#/components/schemas/Secret6'
        UpdateSecretRequestBody:
            type: object
            properties:
                key:
                    type: string
                    description: Secret key
                value:
                    type: string
                    description: Secret value
tags:
    - name: projects
      description: Service for managing projects.
    - name: secrets
      description: Service for managing secrets.
