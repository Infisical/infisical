# yaml-language-server: $schema=https://raw.githubusercontent.com/doordash-oss/oapi-codegen-dd/0479d1d804b0e22dcada175161c70cd9efaf7733/configuration-schema.json
package: secret
skip-prune: true
overlay:
  sources:
    - ../../shared/overlay.yaml
output:
  directory: .
  use-single-file: true
  filename: gen.go
user-templates:
  common.tmpl: ../../templates/common.tmpl
  chi.tmpl: ../../templates/chi.tmpl
additional-imports:
  - alias: apivalidator
    package: github.com/infisical/api/internal/server/api/validator
generate:
  models: true
  handler:
    kind: chi
    validation:
      request: true
      response: true
    output:
      overwrite: false
