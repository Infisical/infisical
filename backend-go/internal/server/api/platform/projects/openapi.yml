openapi: "3.0.0"
info:
  version: 1.0.0
  title: Projects API
  description: Project management endpoints

servers:
  - url: /api/v1/platform/projects

paths:
  /health:
    get:
      operationId: getProjectsHealth
      summary: Health check
      description: Returns health status for the projects service
      tags:
        - Projects
      security: []
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetHealthResponse"

  /:
    post:
      operationId: createProject
      summary: Create a project
      description: Creates a new project in the organization
      tags:
        - Projects
      security:
        - jwt: []
        - identityAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProjectResponse"

components:
  schemas:
    GetHealthResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: Health check message

    CreateProjectRequest:
      type: object
      required: [name, orgId]
      properties:
        name:
          type: string
          minLength: 1
          description: Project name
        orgId:
          type: string
          description: Organization ID

    CreateProjectResponse:
      type: object
      required: [id, name, orgId]
      properties:
        id:
          type: string
          description: Project ID
        name:
          type: string
          description: Project name
        orgId:
          type: string
          description: Organization ID
