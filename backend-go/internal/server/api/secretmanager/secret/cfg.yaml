package: secret
skip-prune: true
input: openapi.yml
overlay:
  sources:
    - ../../shared/overlay.yaml
output:
  directory: .
  use-single-file: true
  filename: gen.go
user-templates:
  common.tmpl: ../../templates/common.tmpl
additional-imports:
  - alias: apivalidator
    package: github.com/infisical/api/internal/server/api/validator
generate:
  models: true
  handler:
    kind: chi
    validation:
      request: true
      response: true
    output:
      overwrite: false
